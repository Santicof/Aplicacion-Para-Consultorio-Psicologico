spring:
  application:
    name: consultorio-psique-turnos
  
  # Configuración de Base de Datos
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/consultorio-psique-turnos}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  
  # Configuración JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  
  # Deshabilitar H2 console en producción
  h2:
    console:
      enabled: false
  
  # Configuración de uploads
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Jackson - permitir strings grandes (base64 imágenes)
  jackson:
    serialization:
      fail-on-empty-beans: false
  
  # DevTools deshabilitado en producción
  devtools:
    restart:
      enabled: false

# Configuración de puerto
server:
  port: ${PORT:3000}
  tomcat:
    max-http-form-post-size: 10MB
    max-swallow-size: 10MB
  # Headers de seguridad
  error:
    include-stacktrace: never
    include-message: never
  
# Configuración de logging
logging:
  level:
    com.psique.turnos: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN

# Google Calendar Integration
google:
  calendar:
    enabled: ${GOOGLE_CALENDAR_ENABLED:true}
    credentials:
      file: classpath:credentials.json
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    application-name: Consultorio Psique Turnos
    calendar-id: primary
    timezone: America/Argentina/Buenos_Aires
    webhook:
      enabled: false
      url: ""
    redirect-uri: ${GOOGLE_CALENDAR_REDIRECT_URI:http://localhost:3000/oauth2callback}
