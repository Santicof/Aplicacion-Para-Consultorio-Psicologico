spring:
  application:
    name: consultorio-psique-turnos
  
  # Configuración de Base de Datos
  datasource:
    url: jdbc:postgresql://localhost:5432/consultorio-psique-turnos
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  
  # Configuración JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  
  # Configuración de puerto
server:
  port: 3000
  
# Configuración de logging
logging:
  level:
    com.psique.turnos: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

# Google Calendar Integration
google:
  calendar:
    enabled: true
    credentials:
      file: classpath:credentials.json
    application-name: Consultorio Psique Turnos
    calendar-id: primary
    timezone: America/Argentina/Buenos_Aires
    # Webhooks (notificaciones en tiempo real)
    webhook:
      enabled: false  # Cambiar a true cuando tengas URL pública
      url: ""  # Ejemplo: https://tu-dominio.com/api/webhooks/google-calendar
