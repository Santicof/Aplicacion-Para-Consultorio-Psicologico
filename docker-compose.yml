version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: psique-postgres
    environment:
      POSTGRES_DB: psique_turnos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - psique-network

  backend:
    build: ./backend
    container_name: psique-backend
    ports:
      - "3000:3000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/psique_turnos
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - postgres
    networks:
      - psique-network

volumes:
  postgres_data:

networks:
  psique-network:
    driver: bridge
